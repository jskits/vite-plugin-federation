name: Extended E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  extended-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Compatibility e2e
        run: pnpm --filter vite-plugin-federation test:e2e:compat

      - name: Shared runtime e2e
        run: pnpm --filter vite-plugin-federation test:e2e:shared

      - name: Multi-remote e2e
        run: CI=1 pnpm --filter vite-plugin-federation test:e2e:multi-remote

      - name: Browser matrix e2e
        run: CI=1 pnpm --filter vite-plugin-federation test:e2e:browser-matrix

      - name: SSR e2e
        run: CI=1 pnpm --filter vite-plugin-federation test:e2e:ssr

      - name: DTS dev e2e
        run: pnpm --filter vite-plugin-federation test:e2e:dts:dev

      - name: Vite peer matrix smoke
        if: matrix.node-version == 22
        run: pnpm test:vite-matrix:smoke
