name: Extended E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  extended-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compatibility e2e
        run: pnpm --filter vite-plugin-federation test:e2e:compat

      - name: Shared runtime e2e
        run: pnpm --filter vite-plugin-federation test:e2e:shared

      - name: SSR e2e
        run: CI=1 pnpm --filter vite-plugin-federation test:e2e:ssr

      - name: DTS dev e2e
        run: pnpm --filter vite-plugin-federation test:e2e:dts:dev
